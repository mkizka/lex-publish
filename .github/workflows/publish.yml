name: Publish Lexicons
on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./
        env:
          GOAT_USERNAME: ${{ secrets.GOAT_USERNAME }}
          GOAT_PASSWORD: ${{ secrets.GOAT_PASSWORD }}
