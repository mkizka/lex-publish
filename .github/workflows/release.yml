name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Update major version tag
        run: |
          MAJOR_TAG=$(echo "${{ github.ref_name }}" | cut -d. -f1)
          git tag -f "$MAJOR_TAG"
          git push origin "$MAJOR_TAG" --force
